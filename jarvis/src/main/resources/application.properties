server.port=8081
spring.application.name=jarvis

spring.datasource.url=jdbc:h2:mem:jarvisdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jarvis.simulator.delay-ms=5000
jarvis.simulator.max-retries=2
jarvis.simulator.retry-backoff-ms=5000
jarvis.simulator.max-payload-bytes=10485760
jarvis.simulator.api-key=jarvis-dev-key
jarvis.simulator.rate-limit-per-minute=50
jarvis.simulator.webhook-signature-enabled=true
jarvis.simulator.webhook-secret=jarvis-webhook-secret
jarvis.simulator.webhook-replay-window-seconds=300
jarvis.simulator.webhook-signature-header=X-Jarvis-Signature
jarvis.simulator.webhook-timestamp-header=X-Jarvis-Timestamp
jarvis.simulator.webhook-correlation-header=X-Correlation-Id
jarvis.simulator.webhook-idempotency-header=Idempotency-Key

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

